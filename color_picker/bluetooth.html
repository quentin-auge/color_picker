<!DOCTYPE html>
<html>
<head>
    <title>Robot RGB Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 30px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00adb5; }
        #colorPicker { width: 150px; height: 150px; border: none; cursor: pointer; background: none; }
        .btn { background: #00adb5; border: none; color: white; padding: 15px 32px; border-radius: 10px; font-size: 16px; margin: 20px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #007d82; }
        .status { margin-top: 20px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Color Picker</h1>
        <p>Pick LEDs color:</p>

        <input type="color" id="colorPicker" value="#ff0000" disabled>
        <br>
        <button class="btn" id="connectBtn">Connect</button>
        <button class="btn" id="disconnectBtn" style="display: none;">Disconnect</button>

        <div class="status" id="status">Status: Disconnected</div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";

        let device, server, characteristic;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const colorPicker = document.getElementById('colorPicker');
        const statusText = document.getElementById('status');

        function handleDisconnect() {
            statusText.innerText = "Status: Disconnected";
            colorPicker.disabled = true;
            connectBtn.style.display = "inline-block";
            disconnectBtn.style.display = "none";
            device = null;
            server = null;
            characteristic = null;
        }

        function sendColor() {
            const hex = colorPicker.value;
            console.log(hex);
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            if (characteristic) {
                const data = new Uint8Array([r, g, b]);
                characteristic.writeValue(data);
            }
        }

        connectBtn.onclick = async () => {
            try {
                statusText.innerText = "Connecting...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "ColorPicker" }],
                    optionalServices: [SERVICE_UUID]
                });

                device.gatt.ondisconnect = handleDisconnect;

                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                statusText.innerText = "Status: Connected";
                colorPicker.disabled = false;
                connectBtn.style.display = "none";
                disconnectBtn.style.display = "inline-block";

                sendColor();
            } catch (error) {
                console.log(error);
                statusText.innerText = "Error: " + error;
            }
        };

        disconnectBtn.onclick = () => {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
            handleDisconnect();
        };

        colorPicker.oninput = sendColor;
    </script>
</body>
</html>
