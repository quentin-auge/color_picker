<!DOCTYPE html>
<html>
<head>
    <title>Color Picker & RTTTL</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            text-align: center;
            background: #1e1e1e;
        }
        .header h1 { color: #00adb5; margin-bottom: 10px; }
        .connect-btn {
            background: #00adb5; border: none; color: white;
            padding: 12px 30px; border-radius: 25px; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .connect-btn:hover { background: #007d82; }
        .header-controls {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        .status {
            font-size: 0.9em;
            margin-top: 15px;
            padding: 5px 12px;
            border-radius: 5px;
            color: #888;
        }
        .status-error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
        }
        .main {
            flex: 1;
            display: flex;
            gap: 20px;
            padding: 20px;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .card {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            flex: 1;
            min-width: 280px;
            max-width: 400px;
        }
        .card h2 {
            color: #00adb5;
            margin-bottom: 20px;
            font-size: 1.3em;
            text-align: center;
        }
        .card-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        #colorPicker {
            width: 150px; height: 150px;
            border: none; cursor: pointer;
            background: none;
        }
        .btn {
            background: #00adb5; border: none; color: white;
            padding: 15px 32px; border-radius: 10px; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #007d82; }
        .btn:disabled {
            background: #444;
            cursor: not-allowed;
        }
        #rtttlInput {
            width: 100%;
            height: 120px;
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-family: monospace;
            font-size: 12px;
            resize: vertical;
            background: #2a2a2a;
            color: white;
        }
        #rtttlInput::placeholder { color: #666; }
        #rtttlSelect {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #2a2a2a;
            color: white;
            font-size: 14px;
            cursor: pointer;
        }
        #rtttlSelect:disabled {
            background: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-controls">
            <button class="connect-btn" id="connectBtn">Connect</button>
            <button class="connect-btn" id="disconnectBtn" style="display: none;">Disconnect</button>
        </div>
        <p class="status status-error" id="status">Disconnected</p>
    </div>

    <div class="main">
        <div class="card">
            <h2>LED Color</h2>
            <div class="card-content">
                <input type="color" id="colorPicker" value="#404040" disabled>
            </div>
        </div>

        <div class="card">
            <h2>RTTTL Player</h2>
            <div class="card-content">
                <select id="rtttlSelect" disabled>
                    <option value="" disabled selected hidden>-- Select Song --</option>
                </select>
                <textarea id="rtttlInput" placeholder="Enter RTTTL string..." disabled></textarea>
                <div style="display: flex; gap: 10px;">
                    <button class="btn" id="playRtttlBtn" disabled>Play</button>
                    <button class="btn" id="stopRtttlBtn" disabled>Stop</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const RGB_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const RTTTL_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a9";
        const RTTTL_MAX_LENGTH = 512;

        const RTTTL_SONGS = [
            "Tetris:d=4,o=5,b=144:e,8b4,8c,d,8c,8b4,a4,8a4,8c,e,8d,8c,b4.,8c,d,e,c,a4,a4,p,8p,d,8f,a,8g,8f,e.,8c,e,8d,8c,b4,8b4,8c,d,e,c,a4,a4,p,2e,2c,2d,2b4,2c,2a4,1b4,2e,2c,2d,2b4,c,e,2a,1g#,e,8b4,8c,d,8c,8b4,a4,8a4,8c,e,8d,8c,b4.,8c,d,e,c,a4,a4,p,8p,d,8f,a,8g,8f,8p,e,8c,e,8d,8c,8p,b4,8c,d,e,8p,c,8a4,a4,p",
            "Mario:d=4,o=5,b=200:p,8g,8f#,8f,d#,8e,8p,8g#4,8a4,8c4,8p,8a4,8c,8d,p,d#,8p,d.,2c,2p,8c,c,8c,8p,8c,d,8e,c,8a4,2g4,8c,c,8c,8p,8c,8d,8e,1p,8c,c,8c,8p,8c,d,8e,c,8a4,2g4,8e,8e,8p,8e,8p,8c,e,g,p,g4,p,c.,8g4,p,e4.,a4,b4,8a#4,a4,g4.,e.,g.,a,8f,8g,8p,e,8c,8d,b4.,c.,8g4,p,e4.,a4,b4,8a#4,a4,g4.,e.,g.,a,8f,8g,8p,e,8c,8d,b4.,8e,c,8g4,p,g#4,8a4,f,8f,2a4,d.,a.,a.,a.,g.,f.,8e,c,8a4,2g4,8e,c,8g4,p,g#4,8a4,f,8f,2a4,8b4,f,8f,f.,e.,d.,8c,e4,8e4,2c4",
            "Zelda:d=4,o=5,b=88:a#4,f4.,8a#4,16a#4,16c,16d,16d#,2f,8f,8f,8f,16f#,16g#,a#..,8a#,8a#,8g#,16f#,g#.,16f#,2f,f,d#.,16f,2f#,8f,8d#,c#.,16d#,2f,8d#,8c#,c.,16d,2e,8g,16f,16f4,16f4,16f4,16f4,16f4,16f4,16f4,8f4,16f4,8f4,a#4,f4.,8a#4,16a#4,16c,16d,16d#,2f,8f,8f,8f,16f#,16g#,a#..,c6,c6,2a,f,f#..,a#,a,2f,f,f#..,a#,a,2f,d,d#..,f#,f,2c#,a#,c.,16d,2e,8g,16f,16f4,16f4,16f4,16f4,16f4,16f4,16f4,8f4,16f4,8f4",
            "StarWars:d=4,o=5,b=108:8a#4,8a#4,8a#4,2f,2c6,8a#,8a,8g,2f6,c6,8a#,8a,8g,2f6,c6,8a#,8a,8a#,2g,8c,8c,8c,2f,2c6,8a#,8a,8g,2f6,c6,8a#,8a,8g,2f6,c6,8a#,8a,8a#,2g,c.,16c,d.,8d,8a#,8a,8g,8f,8f,8g,8a,g,8d,e,c.,16c,d.,8d,8a#,8a,8g,8f,c6.,16g,2g,8p,8c,d.,8d,8a#,8a,8g,8f,8f,8g,8a,g,8d,e,c6.,16c6,f6,8d#6,c#6,8c6,a#,8g#,g,8f,1c6",
            "Indiana Jones:d=4,o=5,b=250:e,8p,8f,8g,8p,1c6,8p.,d,8p,8e,1f,p.,g,8p,8a,8b,8p,1f6,p,a,8p,8b,2c6,2d6,2e6,e,8p,8f,8g,8p,1c6,p,d6,8p,8e6,1f.6,g,8p,8g,e.6,8p,d6,8p,8g,e.6,8p,d6,8p,8g,f.6,8p,e6,8p,8d6,2c6",
            "Birthday:d=4,o=4,b=140:c,8c,d.,c.,f.,e..,c,8c,d.,c.,g.,f..,c,8c,c5.,a.,f.,e.,d.,a#,8a#,a.,f.,g.,f..",
            "Christmas:d=4,o=5,b=140:c,f,8f,8g,8f,8e,d,d,d,g,8g,8a,8g,8f,e,c,c,a,8a,8a#,8a,8g,f,d,8c,8c,d,g,e,2f,c,f,8f,8g,8f,8e,d,d,d,g,8g,8a,8g,8f,e,c,c,a,8a,8a#,8a,8g,f,d,8c,8c,d,g,e,2f,c,f,f,f,2e,e,f,e,d,2c,a,a#,a,g,c6,c,8c,8c,d,g,e,2f,c,f,8f,8g,8f,8e,d,d,d,g,8g,8a,8g,8f,e,c,c,a,8a,8a#,8a,8g,f,d,8c,8c,d,g,e,2f,c,f,f,f,2e,e,f,e,d,2c,a,a#,a,g,c6,c,8c,8c,d,g,e,2f,p"
        ];

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const colorPicker = document.getElementById('colorPicker');
        const statusText = document.getElementById('status');
        const rtttlSelect = document.getElementById('rtttlSelect');
        const rtttlInput = document.getElementById('rtttlInput');
        const playRtttlBtn = document.getElementById('playRtttlBtn');
        const stopRtttlBtn = document.getElementById('stopRtttlBtn');

        function getRtttlName(rtttl) {
            const colonIndex = rtttl.indexOf(':');
            return colonIndex > 0 ? rtttl.substring(0, colonIndex) : rtttl;
        }

        function initRtttlSelect() {
            RTTTL_SONGS.forEach(rtttl => {
                const option = document.createElement('option');
                option.value = rtttl;
                option.textContent = getRtttlName(rtttl);
                rtttlSelect.appendChild(option);
            });
        }

        initRtttlSelect();

        let device, server, characteristic, rtttlCharacteristic;
        let connectionCheckInterval = null;

        function setStatus(message) {
            statusText.innerText = message;
            statusText.className = "status";
        }

        function setErrorStatus(message) {
            statusText.innerText = message;
            statusText.className = "status status-error";
        }

        function checkConnection() {
            if (device && !device.gatt.connected) {
                handleDisconnect();
            }
        }

        function handleDisconnect() {
            if (connectionCheckInterval) {
                clearInterval(connectionCheckInterval);
                connectionCheckInterval = null;
            }
            setErrorStatus("Disconnected");
            colorPicker.disabled = true;
            rtttlSelect.disabled = true;
            rtttlInput.disabled = true;
            playRtttlBtn.disabled = true;
            stopRtttlBtn.disabled = true;
            connectBtn.style.display = "inline-block";
            disconnectBtn.style.display = "none";
            device = null;
            server = null;
            characteristic = null;
            rtttlCharacteristic = null;
        }

        function sendColor() {
            const hex = colorPicker.value;
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            if (characteristic) {
                try {
                    const data = new Uint8Array([r, g, b]);
                    characteristic.writeValue(data);
                    setStatus("Connected");
                } catch (error) {
                    console.log(error);
                    setErrorStatus(error);
                }
            }
        }

        function sendRtttl() {
            try {
                const rtttl = rtttlInput.value.trim();
                if (rtttl.length > RTTTL_MAX_LENGTH) {
                    throw new Error("RTTTL too long (max " + RTTTL_MAX_LENGTH + " chars)");
                }
                if (rtttlCharacteristic) {
                    const encoder = new TextEncoder();
                    const data = encoder.encode(rtttl);
                    rtttlCharacteristic.writeValue(data);
                    setStatus("Connected");
                }
            } catch (error) {
                console.log(error);
                setErrorStatus(error);
            }
        }

        function stopRtttl() {
            if (rtttlCharacteristic) {
                const encoder = new TextEncoder();
                const data = encoder.encode("");
                rtttlCharacteristic.writeValue(data);
                setStatus("Connected");
            }
        }

        connectBtn.onclick = async () => {
            try {
                setStatus("Connecting...");
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "ColorPicker" }],
                    optionalServices: [SERVICE_UUID]
                });

                device.gatt.ondisconnect = handleDisconnect;

                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(RGB_CHARACTERISTIC_UUID);
                rtttlCharacteristic = await service.getCharacteristic(RTTTL_CHARACTERISTIC_UUID);

                setStatus("Connected");
                colorPicker.disabled = false;
                rtttlSelect.disabled = false;
                rtttlInput.disabled = false;
                playRtttlBtn.disabled = false;
                stopRtttlBtn.disabled = false;
                connectBtn.style.display = "none";
                disconnectBtn.style.display = "inline-block";

                connectionCheckInterval = setInterval(checkConnection, 1000);

                sendColor();
            } catch (error) {
                console.log(error);
                setErrorStatus(error);
            }
        };

        disconnectBtn.onclick = () => {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
            handleDisconnect();
        };

        colorPicker.oninput = sendColor;
        playRtttlBtn.onclick = sendRtttl;
        stopRtttlBtn.onclick = stopRtttl;
        function resizeRtttlInput() {
            rtttlInput.style.height = 'auto';
            rtttlInput.style.height = (rtttlInput.scrollHeight + 10) + 'px';
        }

        rtttlInput.oninput = function() {
            rtttlSelect.value = "";
            resizeRtttlInput();
        };
        rtttlSelect.onchange = () => {
            if (rtttlSelect.value) {
                rtttlInput.value = rtttlSelect.value;
                resizeRtttlInput();
            }
        };
    </script>
</body>
</html>
