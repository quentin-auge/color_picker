<!DOCTYPE html>
<html>
<head>
    <title>Robot RGB Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding-top: 50px; }
        .card { background: #1e1e1e; border-radius: 20px; padding: 30px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00adb5; }
        #colorPicker { width: 150px; height: 150px; border: none; cursor: pointer; background: none; }
        .btn { background: #00adb5; border: none; color: white; padding: 15px 32px; border-radius: 10px; font-size: 16px; margin: 20px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #007d82; }
        .status { margin-top: 20px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Color Picker</h1>
        <p>Pick LEDs color:</p>

        <input type="color" id="colorPicker" value="#ff0000" disabled>
        <br>
        <button class="btn" id="connectBtn">Connect</button>
        <button class="btn" id="disconnectBtn" style="display: none;">Disconnect</button>

        <div class="status" id="status">Status: Disconnected</div>

        <hr style="border-color: #333; margin: 30px 0;">

        <h1 style="font-size: 1.5em;">RTTTL Player</h1>
        <p>Enter RTTTL ringtone:</p>

        <textarea id="rtttlInput" placeholder="Enter RTTTL string:" style="width: 80%; height: 80px; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; font-family: monospace; resize: vertical;" disabled></textarea>
        <br>
        <button class="btn" id="playRtttlBtn" disabled>Play</button>
    </div>

    <script>
        const SERVICE_UUID = "4fafc201-1fb5-459e-8fcc-c5c9c331914b";
        const RGB_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a8";
        const RTTTL_CHARACTERISTIC_UUID = "beb5483e-36e1-4688-b7f5-ea07361b26a9";
        const RTTTL_MAX_LENGTH = 512;

        let device, server, characteristic, rtttlCharacteristic;

        const connectBtn = document.getElementById('connectBtn');
        const disconnectBtn = document.getElementById('disconnectBtn');
        const colorPicker = document.getElementById('colorPicker');
        const statusText = document.getElementById('status');
        const rtttlInput = document.getElementById('rtttlInput');
        const playRtttlBtn = document.getElementById('playRtttlBtn');

        function handleDisconnect() {
            statusText.innerText = "Status: Disconnected";
            colorPicker.disabled = true;
            rtttlInput.disabled = true;
            playRtttlBtn.disabled = true;
            connectBtn.style.display = "inline-block";
            disconnectBtn.style.display = "none";
            device = null;
            server = null;
            characteristic = null;
            rtttlCharacteristic = null;
        }

        function sendColor() {
            const hex = colorPicker.value;
            const r = parseInt(hex.substring(1, 3), 16);
            const g = parseInt(hex.substring(3, 5), 16);
            const b = parseInt(hex.substring(5, 7), 16);

            if (characteristic) {
                try {
                    const data = new Uint8Array([r, g, b]);
                    characteristic.writeValue(data);
                } catch (error) {
                    console.log(error);
                    statusText.innerText = error;
                }
            }
        }

        function sendRtttl() {
            try {
                const rtttl = rtttlInput.value.trim();
                if (rtttl.length === 0) {
                    return;
                }
                if (rtttl.length > RTTTL_MAX_LENGTH) {
                    throw new Error("RTTTL too long (max " + RTTTL_MAX_LENGTH + " chars)");
                }
                if (rtttlCharacteristic) {
                    const encoder = new TextEncoder();
                    const data = encoder.encode(rtttl);
                    rtttlCharacteristic.writeValue(data);
                }
            } catch (error) {
                console.log(error);
                statusText.innerText = error;
            }
        }

        connectBtn.onclick = async () => {
            try {
                statusText.innerText = "Connecting...";
                device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: "ColorPicker" }],
                    optionalServices: [SERVICE_UUID]
                });

                device.gatt.ondisconnect = handleDisconnect;

                server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                characteristic = await service.getCharacteristic(RGB_CHARACTERISTIC_UUID);
                rtttlCharacteristic = await service.getCharacteristic(RTTTL_CHARACTERISTIC_UUID);

                statusText.innerText = "Status: Connected";
                colorPicker.disabled = false;
                rtttlInput.disabled = false;
                playRtttlBtn.disabled = false;
                connectBtn.style.display = "none";
                disconnectBtn.style.display = "inline-block";

                sendColor();
            } catch (error) {
                console.log(error);
                statusText.innerText = "Error: " + error;
            }
        };

        disconnectBtn.onclick = () => {
            if (device && device.gatt.connected) {
                device.gatt.disconnect();
            }
            handleDisconnect();
        };

        colorPicker.oninput = sendColor;
        playRtttlBtn.onclick = sendRtttl;
    </script>
</body>
</html>
